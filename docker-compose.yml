version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "${API_PORT:-8000}:8000"

  ai:
    build:
      context: ./ai
    environment:
      ROBUST_AI_PROVIDER: ${ROBUST_AI_PROVIDER:-rule-based}
      ROBUST_AI_MODEL: ${ROBUST_AI_MODEL:-demo-router}
    ports:
      - "${AI_PORT:-8100}:8100"

  dashboard:
    build:
      context: ./dashboard
    environment:
      VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-robust}
      POSTGRES_USER: ${POSTGRES_USER:-robust}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-robust_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"

volumes:
  postgres_data:
